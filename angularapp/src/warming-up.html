<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrainerHub — Starting Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: #f5f0e8;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: rgba(255, 252, 245, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    .brand {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.3rem;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 0.75rem;
      color: #777;
      font-weight: 400;
      margin-bottom: 1.75rem;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.1);
      margin: 0 0 1.75rem;
    }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(0,0,0,0.08);
      border-top-color: #6b7c93;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .status-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
    }

    .status-sub {
      font-size: 0.76rem;
      color: #777;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    /* Status rows */
    .status-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1.75rem;
      text-align: left;
    }

    .row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,252,245,0.75);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.76rem;
      color: #444;
    }

    .row-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #5a9e6f; }
    .dot-muted {
      background: #6b7c93;
      animation: blink 1.4s ease-in-out infinite;
    }

    .badge {
      font-size: 0.66rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
    }

    .badge-ok      { background: #ddf0e4; color: #2d6a45; }
    .badge-loading { background: #dde5f0; color: #2d4a6a; }

    /* Retry button */
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.73rem;
      font-weight: 600;
      color: #6b7c93;
      background: transparent;
      border: 1px solid #c0c8d4;
      border-radius: 6px;
      padding: 7px 18px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn-retry:hover {
      background: #6b7c93;
      color: #fff;
      border-color: #6b7c93;
    }

    .btn-retry svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <h1 class="brand">TrainerHub</h1>
      <p class="tagline">Your ultimate solution for managing trainees and training requirements.</p>

      <hr />

      <div class="spinner-wrap">
        <div class="spinner"></div>
      </div>

      <p class="status-title">Server is starting up</p>
      <p class="status-sub">
        Render's free tier spins down when idle.<br />
        It'll be ready in about 20–40 seconds.
      </p>

      <div class="status-rows">
        <div class="row-item">
          <span class="row-label">
            <span class="dot dot-green"></span>
            Frontend (Vercel)
          </span>
          <span class="badge badge-ok">Live</span>
        </div>
        <div class="row-item">
          <span class="row-label">
            <span class="dot dot-muted"></span>
            Backend (Render)
          </span>
          <span class="badge badge-loading">Starting</span>
        </div>
      </div>

      <button class="btn-retry" onclick="window.location.reload()">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
        Try loading now
      </button>

    </div>
  </div>

  <script>
    // hits root to trigger startup
    const BACKEND_URL = 'https://trainer-hub-ekas.onrender.com';
    

    async function checkBackend() {
      try {
        await fetch(BACKEND_URL, {
          method: 'GET',
          mode: 'no-cors',
          signal: AbortSignal.timeout(6000)
        });
        window.location.href = '/';
      } catch (_) {
        setTimeout(checkBackend, 8000);
      }
    }

    setTimeout(checkBackend, 12000);
  </script>
</body>
</html>
